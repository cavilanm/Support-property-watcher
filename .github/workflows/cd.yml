name: CD - Build, Push & Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
  KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE || 'default' }}

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image-ref: ${{ steps.set-output.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v2
      - uses: docker/setup-buildx-action@v2
      - name: Login to registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - id: build
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
      - name: Set output image ref
        id: set-output
        run: echo "image=${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Decode kubeconfig
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [ -z "$KUBE_CONFIG_B64" ]; then
            echo "Missing KUBE_CONFIG secret"
            exit 1
          fi
          mkdir -p $HOME/.kube
          echo "$KUBE_CONFIG_B64" | base64 --decode > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
      - uses: azure/setup-kubectl@v3
        with:
          version: 'latest'
      - name: Deploy manifests
        run: |
          IMAGE="${{ needs.build-and-push.outputs.image-ref }}"
          kubectl --namespace "${{ env.KUBE_NAMESPACE }}" set image deployment --all "*=${IMAGE}" --record || true
          kubectl --namespace "${{ env.KUBE_NAMESPACE }}" apply -f k8s/ --recursive
